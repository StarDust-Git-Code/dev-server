; ============================================================
;  PlatformIO Configuration (Root)
;  GoogleFindMyTools - FMDN Tracker Firmware
;
;  Supported Environments:
;    - esp32_wroom32 : ESP32 WROOM-32 (standard dual-core ESP32 DevKit)
;    - esp32_s3      : ESP32-S3 Dev Module / Board
;    - esp32_c3      : ESP32-C3 (e.g. Super Mini, DevKit)
; ============================================================

[platformio]
src_dir = ESP32Firmware/src
include_dir = ESP32Firmware/include
lib_dir = ESP32Firmware/lib

; ─────────────────────────────────────────
;  Common configuration for all environments
; ─────────────────────────────────────────
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv

; ─────────────────────────────────────────
;  ESP32 WROOM-32 (Classic dual-core ESP32)
; ─────────────────────────────────────────
[env:esp32_wroom32]
board = esp32dev
build_flags =
    -D CORE_DEBUG_LEVEL=3

; ─────────────────────────────────────────
;  ESP32-S3 Dev Module / Board
; ─────────────────────────────────────────
[env:esp32_s3]
board = esp32-s3-devkitc-1
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=3

; ─────────────────────────────────────────
;  ESP32-C3 (e.g., Super Mini, DevKitM)
; ─────────────────────────────────────────
[env:esp32_c3]
board = esp32-c3-devkitm-1
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=3
