; ============================================================
;  PlatformIO Configuration
;  GoogleFindMyTools - FMDN Tracker Firmware
;
;  Supported Environments:
;    - c3_supermini  : ESP32-C3 Super Mini (Arduino framework)
;    - s3_arduino    : ESP32-S3 Dev Module (Arduino framework)
;    - c3_idf        : ESP32-C3 (ESP-IDF framework, NimBLE)
;
;  Usage:
;    Build all:          pio run
;    Build one target:   pio run -e c3_supermini
;    Upload one target:  pio run -e c3_supermini -t upload
;    Open monitor:       pio device monitor -e c3_supermini
;    Clean:              pio run -t clean
; ============================================================

; ─────────────────────────────────────────
;  Default environments to build (all three)
; ─────────────────────────────────────────
[env]
monitor_speed = 115200
upload_speed  = 921600

; ─────────────────────────────────────────
;  Shared Arduino BLE settings
; ─────────────────────────────────────────
[arduino_common]
framework       = arduino
platform        = espressif32
lib_deps        =
    ; No external libraries needed — uses built-in ESP32 BLE stack

; ─────────────────────────────────────────
;  ESP32-C3 Super Mini  (Arduino + BLE)
;
;  Board:     ESP32-C3 Super Mini
;  BLE stack: Arduino BLEDevice (classic Bluedroid)
;  LED:       GPIO 8, active LOW
; ─────────────────────────────────────────
[env:c3_supermini]
extends         = arduino_common
board           = esp32-c3-devkitm-1
board_build.mcu = esp32c3

; Source — the dedicated C3 Super Mini sketch
build_src_filter = +<../ESP32-C3-SuperMini/ESP32-C3-SuperMini.ino>

; USB CDC is mandatory for auto-reset / Serial on the Super Mini
build_flags     =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CONFIG_BT_NIMBLE_ENABLED=0
    -DCORE_DEBUG_LEVEL=3

upload_protocol = esptool
board_upload.flash_size  = 4MB
board_upload.maximum_ram_size = 327680

; ─────────────────────────────────────────
;  ESP32-S3  (Arduino + BLE)
;
;  Board:     ESP32-S3 Dev Module
;  BLE stack: Arduino BLEDevice (classic Bluedroid)
;  Source:    ESP32-S3-Arduino sketch
; ─────────────────────────────────────────
[env:s3_arduino]
extends         = arduino_common
board           = esp32s3box
board_build.mcu = esp32s3

; Source — the ESP32-S3 Arduino sketch
build_src_filter = +<../ESP32-S3-Arduino/ESP32-S3-Arduino.ino>

build_flags     =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3

upload_protocol = esptool
board_upload.flash_size = 4MB

; ─────────────────────────────────────────
;  ESP32-C3  (ESP-IDF + NimBLE)
;
;  Board:     Any ESP32-C3 module
;  BLE stack: NimBLE (via ESP-IDF)
;  Source:    main/main.c
; ─────────────────────────────────────────
[env:c3_idf]
platform        = espressif32
framework       = espidf
board           = esp32-c3-devkitm-1
board_build.mcu = esp32c3

; Source — the ESP-IDF main.c
build_src_filter = +<main/main.c>

; Enable NimBLE (Bluetooth LE host stack used by ESP-IDF firmware)
build_flags     =
    -D CONFIG_BT_ENABLED=1
    -D CONFIG_BT_NIMBLE_ENABLED=1
    -D CONFIG_IDF_TARGET_ESP32C3=1
    -D CORE_DEBUG_LEVEL=3

; sdkconfig defaults for C3 (enables BT + NimBLE)
board_build.sdkconfig_path = sdkconfig.defaults.esp32c3

upload_protocol = esptool
monitor_filters = esp32_exception_decoder
